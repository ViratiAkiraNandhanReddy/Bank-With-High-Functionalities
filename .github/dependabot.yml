version: 2

updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: weekly

    open-pull-requests-limit: 5

    commit-message:
      prefix: "deps"

    labels:
      - "dependencies"

    groups:
      production-dependencies:
        dependency-type: "production"

      development-dependencies:
        dependency-type: "development"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: weekly

    labels:
      - "dependencies"

    commit-message:
      prefix: "ci"
